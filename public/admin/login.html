<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIMSME Admin - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center">
    <div class="bg-white rounded-3xl shadow-2xl p-8 w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">CIMSME Admin</h1>
            <p class="text-gray-600">Content Management System</p>
        </div>

        <form id="loginForm" onsubmit="handleAdminLogin(event)">
            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-semibold mb-2">Email Address</label>
                <input 
                    type="email" 
                    id="email" 
                    required 
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                    placeholder="Enter your email"
                >
            </div>

            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-semibold mb-2">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    required 
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                    placeholder="Enter your password"
                >
            </div>

            <button 
                type="submit" 
                class="w-full bg-gradient-to-r from-blue-600 to-purple-600 text-white py-3 rounded-xl font-semibold hover:shadow-lg transition-all duration-300 transform hover:scale-105"
                id="loginBtn"
            >
                Login to Dashboard
            </button>
        </form>

        <div id="errorMessage" class="mt-4 p-3 bg-red-100 border border-red-300 text-red-700 rounded-lg hidden"></div>
        <div id="successMessage" class="mt-4 p-3 bg-green-100 border border-green-300 text-green-700 rounded-lg hidden"></div>
    </div>

    <script>
        let isProcessing = false;

        async function handleAdminLogin(event) {
            event.preventDefault();
            
            if (isProcessing) return;
            isProcessing = true;
            
            const loginBtn = document.getElementById('loginBtn');
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            
            // Reset messages
            errorMessage.classList.add('hidden');
            successMessage.classList.add('hidden');
            
            // Show loading state
            loginBtn.textContent = 'Logging in...';
            loginBtn.disabled = true;

            try {
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;

                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();

                if (data.success && data.data && data.data.token) {
                    // Save authentication data
                    localStorage.setItem('adminToken', data.data.token);
                    localStorage.setItem('adminData', JSON.stringify(data.data.admin));
                    
                    showMessage('Login successful! Redirecting...', 'success');
                    
                    // Redirect to dashboard
                    setTimeout(() => {
                        window.location.href = '/admin/dashboard.html';
                    }, 1000);
                    
                } else {
                    throw new Error(data.message || 'Login failed');
                }
                
            } catch (error) {
                console.error('Login error:', error);
                showMessage(error.message || 'Login failed. Please try again.', 'error');
                
            } finally {
                loginBtn.textContent = 'Login to Dashboard';
                loginBtn.disabled = false;
                isProcessing = false;
            }
        }

        function showMessage(text, type) {
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            
          
            errorMessage.classList.add('hidden');
            successMessage.classList.add('hidden');
            
            
            if (type === 'error') {
                errorMessage.textContent = text;
                errorMessage.classList.remove('hidden');
            } else if (type === 'success') {
                successMessage.textContent = text;
                successMessage.classList.remove('hidden');
            }
        }
       
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !isProcessing) {
                const loginForm = document.getElementById('loginForm');
                if (document.activeElement && loginForm.contains(document.activeElement)) {
                    handleAdminLogin(e);
                }
            }
        });
    </script>
</body>
</html>
