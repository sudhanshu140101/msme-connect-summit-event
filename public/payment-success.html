<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful - CIMSME</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #065f46, #047857);
      padding: 16px;
    }

    .card {
      background: #ffffff;
      max-width: 460px;
      width: 100%;
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(15, 23, 42, 0.35);
      padding: 32px 28px 26px;
      text-align: center;
      position: relative;
      overflow: hidden;
      animation: slideUp 0.5s ease;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at top left, rgba(16, 185, 129, 0.12), transparent 55%),
        radial-gradient(circle at bottom right, rgba(15, 23, 42, 0.08), transparent 55%);
      pointer-events: none;
    }

    .icon {
      width: 80px;
      height: 80px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 42px;
      background: #d1fae5;
      color: #059669;
      box-shadow: 0 12px 24px rgba(16, 185, 129, 0.35);
      position: relative;
      z-index: 1;
      animation: checkPop 0.6s ease 0.2s both;
    }

    @keyframes checkPop {
      0% {
        transform: scale(0);
      }
      50% {
        transform: scale(1.1);
      }
      100% {
        transform: scale(1);
      }
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
      padding: 5px 14px;
      border-radius: 999px;
      margin-bottom: 12px;
      background: #d1fae5;
      color: #059669;
      position: relative;
      z-index: 1;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #111827;
      margin-bottom: 10px;
      position: relative;
      z-index: 1;
    }

    p {
      font-size: 0.95rem;
      color: #4b5563;
      line-height: 1.6;
      margin-bottom: 8px;
      position: relative;
      z-index: 1;
    }

    .info-box {
      background: #f9fafb;
      border-radius: 12px;
      padding: 14px;
      margin: 16px 0;
      position: relative;
      z-index: 1;
    }

    .info-box p {
      font-size: 0.88rem;
      color: #6b7280;
      margin-bottom: 0;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-top: 20px;
      position: relative;
      z-index: 1;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 11px 20px;
      border-radius: 999px;
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, #059669, #047857);
      color: #ffffff;
      box-shadow: 0 8px 16px rgba(5, 150, 105, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(5, 150, 105, 0.4);
    }

    .btn-outline {
      background: #ffffff;
      color: #111827;
      border-color: #e5e7eb;
    }

    .btn-outline:hover {
      background: #f9fafb;
      transform: translateY(-1px);
    }

    @media (max-width: 480px) {
      .card {
        padding: 26px 20px 22px;
      }

      h1 {
        font-size: 1.4rem;
      }

      .actions {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✓</div>
    <div class="badge">
      <span>Payment Successful</span>
    </div>

    <h1>Thank you for your payment!</h1>
    <p>Your membership application has been submitted successfully.</p>

    <div class="info-box">
      <p><strong>What's Next?</strong></p>
      <p>You will receive a confirmation email shortly with your membership details and next steps.</p>
      <p id="orderIdLine" style="display:none; margin-top:10px; font-size:0.85rem; color:#6b7280;"><strong>Order ID:</strong> <span id="orderIdValue"></span></p>
    </div>

    <div class="actions">
      <a href="/" class="btn btn-primary">Go to Home Page </a>
      
    </div>
  </div>
  <script>
    (function() {
      var p = new URLSearchParams(window.location.search);
      var orderId = p.get('orderId');
      if (orderId) {
        var line = document.getElementById('orderIdLine');
        var val = document.getElementById('orderIdValue');
        if (line && val) { val.textContent = orderId; line.style.display = 'block'; }
      }
    })();
  </script>
</body>
</html>
